<script type="text/javascript">
  RED.nodes.registerType("openccu-loom-interfaces", {
    category: "openccu-loom",
    color: "#A1C9F1",
    defaults: {
      name: { value: "" },
      server: { value: "", type: "openccu-loom-server", required: true },
      action: { value: "list" },
      id: { value: "" }
    },
    inputs: 1,
    outputs: 1,
    icon: "bridge.svg",
    label: function () {
      return this.name || `interfaces ${this.action}`;
    },
    paletteLabel: "interfaces"
  });
</script>

<script type="text/html" data-template-name="openccu-loom-interfaces">
  <div class="form-row">
    <label for="node-input-name"><i class="fa fa-tag"></i> <span data-i18n="openccu-loom-interfaces.label.name"></span></label>
    <input type="text" id="node-input-name" />
  </div>
  <div class="form-row">
    <label for="node-input-server"><i class="fa fa-server"></i> <span data-i18n="openccu-loom-interfaces.label.server"></span></label>
    <input type="text" id="node-input-server" />
  </div>
  <div class="form-row">
    <label for="node-input-action"><i class="fa fa-exchange"></i> <span data-i18n="openccu-loom-interfaces.label.action"></span></label>
    <select id="node-input-action">
      <option value="list" data-i18n="openccu-loom-interfaces.action.list"></option>
      <option value="get" data-i18n="openccu-loom-interfaces.action.get"></option>
      <option value="reconnect" data-i18n="openccu-loom-interfaces.action.reconnect"></option>
    </select>
  </div>
  <div class="form-row">
    <label for="node-input-id"><i class="fa fa-key"></i> <span data-i18n="openccu-loom-interfaces.label.id"></span></label>
    <input type="text" id="node-input-id" placeholder="HmIP-RF" />
  </div>
</script>

<script type="text/html" data-help-name="openccu-loom-interfaces">
  <p>Lists, fetches and reconnects southbound interfaces via
  <code>/interfaces</code> and <code>/interfaces/{id}/reconnect</code>.</p>
</script>
