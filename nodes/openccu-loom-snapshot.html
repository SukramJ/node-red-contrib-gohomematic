<script type="text/javascript">
  RED.nodes.registerType("openccu-loom-snapshot", {
    category: "openccu-loom",
    color: "#A1C9F1",
    defaults: {
      name: { value: "" },
      server: { value: "", type: "openccu-loom-server", required: true }
    },
    inputs: 1,
    outputs: 1,
    icon: "file.svg",
    label: function () {
      return this.name || "snapshot";
    },
    paletteLabel: "snapshot"
  });
</script>

<script type="text/html" data-template-name="openccu-loom-snapshot">
  <div class="form-row">
    <label for="node-input-name"><i class="fa fa-tag"></i> <span data-i18n="openccu-loom-snapshot.label.name"></span></label>
    <input type="text" id="node-input-name" />
  </div>
  <div class="form-row">
    <label for="node-input-server"><i class="fa fa-server"></i> <span data-i18n="openccu-loom-snapshot.label.server"></span></label>
    <input type="text" id="node-input-server" />
  </div>
</script>

<script type="text/html" data-help-name="openccu-loom-snapshot">
  <p>Fetches a full daemon snapshot (devices, programs, sysvars, …) via
  <code>GET /snapshot</code>. Use this in response to a
  <code>replay_lost</code> control frame from the events node to resync state.</p>
</script>
